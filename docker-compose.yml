services:

  # ── Infrastructure ─────────────────────────────────────────────────────────
 
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: logistics_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      retries: 5
      start_period: 20s
 
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: logistics_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      retries: 10
      start_period: 40s
 
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: logistics_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: logistics
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
 
  # ── Services ───────────────────────────────────────────────────────────────
  
  driverservice.api:
    build:
      context: .
      dockerfile: Services/DriverService/DriverService.Api/Dockerfile
    image: logistics-driverservice:1.5.0
    container_name: logistics_driverservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DriverDbConn: "Server=host.docker.internal,14332;Database=DriverServiceDb;User Id=nodedev;Password=YourStrongPassword123!;TrustServerCertificate=True;"
    ports:
      - "5000:8080"
  
  truckservice.api:
    build:
      context: .
      dockerfile: Services/TruckService/TruckService.Api/Dockerfile
    image: logistics-truckservice:1.0.0
    container_name: logistics_truckservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TruckDbConn: "Server=host.docker.internal,14332;Database=TruckServiceDb;User Id=nodedev;Password=YourStrongPassword123!;TrustServerCertificate=True;"
    ports:
      - "5001:8080"

  dispatcherservice.api:
    build:
      context: .
      dockerfile: Services/DispatcherService/DispatcherService.Api/Dockerfile
    image: logistics-dispatcherservice:1.2.0
    container_name: logistics_dispatcherservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DispatcherDbConn: "Server=host.docker.internal,14332;Database=DispatcherServiceDb;User Id=nodedev;Password=YourStrongPassword123!;TrustServerCertificate=True;"
    ports:
      - "5002:8080"

  customerservice.api:
    build:
      context: .
      dockerfile: Services/CustomerService/CustomerService.Api/Dockerfile
    image: logistics-customerservice:1.0.0
    container_name: logistics_customerservice
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__CustomerDbConn: "Server=host.docker.internal,14332;Database=CustomerServiceDb;User Id=nodedev;Password=YourStrongPassword123!;TrustServerCertificate=True;"
    ports:
      - "5003:8080"

  tripservice.api:
    build:
      context: .
      dockerfile: Services/TripService/TripService.Api/Dockerfile
    image: logistics-tripservice:1.3.0
    container_name: logistics_tripservice
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TripDbConn: "Server=host.docker.internal,14332;Database=TripServiceDb;User Id=nodedev;Password=YourStrongPassword123!;TrustServerCertificate=True;"
      Kafka__BootstrapServers: "kafka:29092"
    ports:
      - "5004:8080"

  reportservice.api:
    build:
      context: .
      dockerfile: Services/ReportService/ReportService.Api/Dockerfile
    image: logistics-reportservice:1.0.1
    container_name: logistics_reportservice
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__ReportDbConn: "Server=host.docker.internal,14332;Database=ReportServiceDb;User=nodedev;Password=YourStrongPassword123!;TrustServerCertificate=true;"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__ConsumerGroupId: "report-service"
    ports:
      - "5005:8080"